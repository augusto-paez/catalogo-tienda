<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo de productos">
  <title>Tienda</title>

  <!-- Estilos: theme primero porque todos los demás dependen de sus variables -->
  <link rel="stylesheet" href="assets/css/theme.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/header.css">
  <link rel="stylesheet" href="assets/css/hero.css">
  <link rel="stylesheet" href="assets/css/toolbar.css">
  <link rel="stylesheet" href="assets/css/catalogo.css">
  <link rel="stylesheet" href="assets/css/modal.css">
  <link rel="stylesheet" href="assets/css/utilities.css">
</head>
<body>

  <!-- Header: nombre/logo de la tienda, redes sociales y botón de WhatsApp -->
  <header class="header">
    <div class="header-inner">

      <div class="header-brand">
        <img id="store-logo" class="header-logo" src="" alt="Logo" style="display:none">
        <span id="store-nombre" class="header-nombre"></span>
        <span id="store-slogan" class="header-slogan"></span>
      </div>

      <div class="header-actions">
        <div id="header-redes" class="header-redes"></div>
        <button class="btn-wa-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
          <span>Consultanos</span>
        </button>
      </div>

    </div>
  </header>

  <!-- Hero: título y slogan de bienvenida -->
  <section class="hero">
    <div class="hero-inner">
      <h1 id="hero-titulo" class="hero-titulo"></h1>
      <p id="hero-subtitulo" class="hero-subtitulo"></p>
    </div>
  </section>

  <!-- Toolbar: buscador y botones de filtro por categoría -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </span>
      <input
        id="search-input"
        class="search-input"
        type="search"
        placeholder="Buscar productos..."
        autocomplete="off"
        aria-label="Buscar productos"
      >
    </div>
    <div id="filtros" class="filtros" role="group" aria-label="Filtrar por categoría"></div>
  </div>

  <!-- Contador de resultados -->
  <p id="resultados-info" class="resultados-info"></p>

  <!-- Catálogo: grilla de cards generada desde catalogo.js -->
  <main id="catalogo" class="catalogo" role="main"></main>

  <!-- Modal de detalle: generado desde modal.js al clickear una card -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true">
    <div id="modal-contenido" class="modal"></div>
  </div>

  <!-- Botón flotante de WhatsApp -->
  <button class="btn-wa-flotante" aria-label="Contactar por WhatsApp">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </button>

  <!-- Footer -->
  <footer class="footer">
    <p>© 2025 <span id="footer-nombre"></span>. Todos los derechos reservados.</p>
  </footer>

  <script type="module" src="assets/js/app.js"></script>

</body>
</html>
